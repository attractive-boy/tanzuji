<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>碳足迹原型 — TreeViz + Timeline</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>碳足迹原型</h1>
    <p>演示：树木生长隐喻 + 时间轴（示例数据）</p>
  </header>

  <main>
    <section id="controls">
      <label>新增活动（示例）
        <fluent-select id="activityType" style="width:220px">
          <fluent-option value="transport">交通（km）</fluent-option>
          <fluent-option value="electricity">用电（kWh）</fluent-option>
          <fluent-option value="food">食物（kg）</fluent-option>
        </fluent-select>
      </label>
      <label>数量 <fluent-text-field id="amount" type="number" value="1" style="width:120px"></fluent-text-field></label>
      <label>因子（gCO2e/unit） <fluent-text-field id="factor" type="number" value="500" style="width:140px"></fluent-text-field></label>
      <fluent-button id="addBtn" appearance="accent">添加并更新可视化</fluent-button>
      <fluent-button id="resetBtn">重置示例数据</fluent-button>
    </section>

    <section id="viz">
      <div class="viz-col">
        <h2>树木生长（隐喻）</h2>
        <canvas id="treeCanvas" width="400" height="300"></canvas>
        <div id="treeStats" class="stats"></div>
      </div>

      <div class="viz-col">
        <h2>时间轴（最近 14 天）</h2>
        <svg id="timeline" width="600" height="300"></svg>
        <div id="timelineStats" class="stats"></div>
      </div>
    </section>

    <section id="ledger">
      <h3>示例账本</h3>
      <ul id="entries"></ul>
    </section>
  </main>

  <footer>
    <small>示例原型 — 本地运行即可。</small>
  </footer>

  <!-- Fluent Web Components (CDN) - load as module and before app scripts -->
  <script type="module" src="https://unpkg.com/@fluentui/web-components@latest/dist/web-components.min.js"></script>

  <script src="treeViz.js"></script>
  <script src="timeline.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>


  <!-- Badge modal -->
  <div id="badgeModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button id="closeBadge" class="close">✕</button>
      <div id="badgeBody">
        <h3 id="badgeTitle">徽章</h3>
        <p id="badgeDesc"></p>
        <div id="badgeIcon" style="font-size:48px; text-align:center"></div>
      </div>
    </div>
  </div>
</body>
</html>
