<!DOCTYPE html>
<html>
<head>
    <title>可视化调试页面</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { display: flex; gap: 20px; }
        .viz-section { border: 1px solid #ccc; padding: 10px; }
        canvas, svg { border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>可视化调试页面</h1>
    
    <div class="container">
        <div class="viz-section">
            <h2>树木可视化测试</h2>
            <canvas id="testCanvas" width="400" height="300"></canvas>
            <div id="treeInfo"></div>
        </div>
        
        <div class="viz-section">
            <h2>时间轴测试</h2>
            <svg id="testTimeline" width="400" height="200"></svg>
            <div id="timelineInfo"></div>
        </div>
    </div>

    <div>
        <h2>调试信息</h2>
        <div id="debugInfo"></div>
    </div>

    <!-- 加载必要的脚本 -->
    <script src="treeViz.js"></script>
    <script src="timeline.js"></script>
    
    <script>
        // 调试信息显示
        function logDebug(msg) {
            const debugDiv = document.getElementById('debugInfo');
            debugDiv.innerHTML += `<p>[${new Date().toLocaleTimeString()}] ${msg}</p>`;
            console.log(msg);
        }

        // 测试数据
        const testData = [1.2, 2.5, 0.8, 3.1, 1.9, 2.3, 1.7, 2.8, 0.9, 1.5, 2.1, 1.3, 2.7, 1.1];

        window.addEventListener('DOMContentLoaded', function() {
            logDebug('DOM加载完成');
            
            try {
                // 测试树木可视化
                const canvas = document.getElementById('testCanvas');
                if (canvas) {
                    logDebug('找到canvas元素');
                    const treeViz = new TreeViz(canvas);
                    logDebug('TreeViz实例创建成功');
                    
                    const totalKg = testData.reduce((a,b) => a + b, 0);
                    treeViz.setCumulativeKg(totalKg);
                    logDebug(`设置累计排放量: ${totalKg.toFixed(2)} kgCO2e`);
                    
                    document.getElementById('treeInfo').innerHTML = `
                        <p>累计排放: ${totalKg.toFixed(2)} kgCO2e</p>
                        <p>Canvas尺寸: ${canvas.width} x ${canvas.height}</p>
                    `;
                } else {
                    logDebug('未找到canvas元素');
                }

                // 测试时间轴
                const svg = document.getElementById('testTimeline');
                if (svg) {
                    logDebug('找到SVG元素');
                    renderTimeline(svg, testData);
                    logDebug('时间轴渲染完成');
                    
                    document.getElementById('timelineInfo').innerHTML = `
                        <p>数据点数: ${testData.length}</p>
                        <p>最大值: ${Math.max(...testData).toFixed(2)} kgCO2e</p>
                        <p>平均值: ${(testData.reduce((a,b) => a + b, 0) / testData.length).toFixed(2)} kgCO2e</p>
                    `;
                } else {
                    logDebug('未找到SVG元素');
                }

                logDebug('所有测试完成');
                
            } catch (error) {
                logDebug(`错误: ${error.message}`);
                console.error(error);
            }
        });
    </script>
</body>
</html>
